defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: pusht_hwm_${backbone.type}_p${predictor.size}_fs${frameskip}
subdir: null
seed: 42
save_epoch_interval: 5

# --- Data ---
dataset_name: pusht_expert_train
cache_dir: null
n_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}

# HWM high-level timescale. For PushT, action dim is 2, so frameskip=25
# gives a 50-D primitive-action block before the action embedder.
frameskip: 25

batch_size: 64
num_workers: 8
train_split: 0.9

# --- Backbone ---
backbone:
  name: facebook/dinov2-small
  type: dinov2_small
  is_video_encoder: false

image_size: 224
patch_size: 14

# --- High-level HWM predictor ---
wm:
  history_size: 3
  num_preds: 1
  encoding:
    proprio: 10
    action: 64

predictor:
  size: small
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  # HWM paper uses latent prediction losses; L1 is a good first match.
  type: l1
  action_key: action

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 2e-4
  weight_decay: 0.0

# --- Trainer ---
trainer:
  max_epochs: 50
  strategy: ddp
  devices: auto
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 1.0

# --- Logging ---
wandb:
  enable: false
  project: swm
  entity: null

dump_object: true
